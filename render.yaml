services:
  # FastAPI Web Service
  - type: web
    name: hotel-ordering-app
    runtime: python
    region: oregon
    plan: free
    rootDir: app
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hotel_db
          property: connectionString

databases:
  - name: hotel_db
    plan: free
    region: oregon


