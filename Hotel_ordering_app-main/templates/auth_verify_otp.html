{% extends "base.html" %}

{% block content %}
<div class="auth-container" style="max-width: 400px; margin: 50px auto;">
    <div class="card">
        <h3 style="text-align: center; margin-bottom: 1.5rem; color: #2c3e50;">Verification Required</h3>

        <p style="text-align: center; color: #555; margin-bottom: 2rem;">
            We have sent a 6-digit verification code to<br>
            <strong>{{ email }}</strong>
        </p>

        {% if error %}
        <div
            style="background: #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; text-align: center;">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ target_url }}" method="post">
            <div style="margin-bottom: 2rem;">
                <label style="text-align: center; display: block; margin-bottom: 0.5rem;">Enter OTP Code</label>
                <input type="text" name="otp" maxlength="6" required placeholder="000000"
                    style="font-size: 2rem; letter-spacing: 0.5rem; text-align: center; width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 6px;"
                    pattern="[0-9]{6}" title="6 digit code">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Verify Code</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <form action="{{ target_url }}/resend" method="post" style="display: inline;">
                <button type="submit"
                    style="background: none; border: none; color: #666; text-decoration: underline; cursor: pointer; font-size: 0.9rem;">Resend
                    Code</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
