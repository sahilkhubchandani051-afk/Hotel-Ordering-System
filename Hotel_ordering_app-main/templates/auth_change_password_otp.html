{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md mt-10">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Change Password</h2>

    <!-- Step 1: Request OTP -->
    <div id="step-1">
        <p class="text-gray-600 mb-4 text-sm">To verify it's you, we will send a One Time Password (OTP) to your
            registered email.</p>

        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Registered Email</label>
            <input type="email" id="email-input"
                class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                value="{{ request.session.user.email }}" readonly>
        </div>

        <button onclick="requestOTP()" id="btn-request-otp"
            class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-200">
            Send OTP
        </button>
    </div>

    <!-- Step 2: Verify OTP -->
    <div id="step-2" style="display: none;">
        <p class="text-gray-600 mb-4 text-sm">Enter the 6-digit OTP sent to <span id="display-email"
                class="font-bold"></span></p>

        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Enter OTP</label>
            <input type="text" id="otp-input" placeholder="123456" maxlength="6"
                class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-center tracking-widest text-xl">
        </div>

        <button onclick="verifyOTP()" id="btn-verify-otp"
            class="w-full bg-green-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-green-700 transition duration-200">
            Verify OTP
        </button>

        <div class="mt-4 text-center">
            <button onclick="resetFlow()" class="text-xs text-gray-500 underline">Wrong email? Restart</button>
        </div>
    </div>

    <!-- Step 3: New Password -->
    <div id="step-3" style="display: none;">
        <p class="text-green-600 mb-4 text-sm font-bold">OTP Verified! Set your new password.</p>

        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">New Password</label>
            <input type="password" id="new-password"
                class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Min 6 chars">
        </div>

        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Confirm Password</label>
            <input type="password" id="confirm-password"
                class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button onclick="updatePassword()" id="btn-update-pass"
            class="w-full bg-purple-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-purple-700 transition duration-200">
            Update Password
        </button>
    </div>

    <!-- Status Messages -->
    <div id="message-box" class="mt-4 hidden p-3 rounded text-sm text-center"></div>
</div>

<script>
    const emailInput = document.getElementById('email-input');

    async function requestOTP() {
        const btn = document.getElementById('btn-request-otp');
        const email = emailInput.value;
        setLoading(btn, true);
        showMessage("");

        try {
            const res = await fetch('/auth/request-password-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
                document.getElementById('display-email').innerText = email;
                showMessage("OTP Sent! Check your inbox.", "success");
            } else {
                showMessage(data.error || "Failed to send OTP", "error");
            }
        } catch (e) {
            showMessage("Network error", "error");
        } finally {
            setLoading(btn, false);
        }
    }

    async function verifyOTP() {
        const btn = document.getElementById('btn-verify-otp');
        const otp = document.getElementById('otp-input').value;
        const email = emailInput.value;

        if (otp.length < 6) {
            showMessage("Please enter valid OTP", "error");
            return;
        }

        setLoading(btn, true);
        showMessage("");

        try {
            const res = await fetch('/auth/verify-password-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, otp: otp })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('step-2').style.display = 'none';
                document.getElementById('step-3').style.display = 'block';
                showMessage("Verified! Please set new password.", "success");
            } else {
                showMessage(data.error || "Invalid OTP", "error");
            }
        } catch (e) {
            showMessage("Network error (Verify)", "error");
            console.error(e);
        } finally {
            setLoading(btn, false);
        }
    }

    async function updatePassword() {
        const btn = document.getElementById('btn-update-pass');
        const p1 = document.getElementById('new-password').value;
        const p2 = document.getElementById('confirm-password').value;
        const email = emailInput.value;

        if (p1.length < 6) {
            showMessage("Password must be at least 6 characters", "error");
            return;
        }

        if (p1 !== p2) {
            showMessage("Passwords do not match", "error");
            return;
        }

        setLoading(btn, true);
        showMessage("");

        try {
            const res = await fetch('/auth/update-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, new_password: p1 })
            });
            const data = await res.json();

            if (data.success) {
                // Success - Redirect to profile or dashboard
                window.location.href = "/customer/profile?success=Password updated successfully";
            } else {
                showMessage(data.error || "Update failed", "error");
            }
        } catch (e) {
            showMessage("Network error", "error");
        } finally {
            setLoading(btn, false);
        }
    }

    function resetFlow() {
        document.getElementById('step-1').style.display = 'block';
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('step-3').style.display = 'none';
        showMessage("");
    }

    function showMessage(msg, type = "info") {
        const box = document.getElementById('message-box');
        if (!msg) {
            box.classList.add('hidden');
            return;
        }
        box.innerText = msg;
        box.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');

        if (type === "error") {
            box.classList.add('bg-red-100', 'text-red-700');
        } else if (type === "success") {
            box.classList.add('bg-green-100', 'text-green-700');
        } else {
            box.classList.add('bg-blue-100', 'text-blue-700');
        }
    }

    function setLoading(btn, isLoading) {
        if (isLoading) {
            btn.dataset.original = btn.innerText;
            btn.innerText = "Processing...";
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
        } else {
            btn.innerText = btn.dataset.original || "Submit";
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    }
</script>
{% endblock %}
