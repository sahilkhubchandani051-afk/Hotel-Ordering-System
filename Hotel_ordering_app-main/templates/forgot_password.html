{% extends "base.html" %}

{% block content %}
<div class="auth-container" style="max-width: 400px; margin: 50px auto;">
    <div class="card">
        <h3 style="text-align: center; margin-bottom: 2rem;">Reset Password</h3>

        {% if error %}
        <div style="background: #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/forgot-password" method="post">
            <div style="margin-bottom: 1.5rem;">
                <label>Enter Registered Email</label>
                <input type="email" name="email" class="form-control" required placeholder="john@example.com">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Verification Code</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            <a href="/">Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
