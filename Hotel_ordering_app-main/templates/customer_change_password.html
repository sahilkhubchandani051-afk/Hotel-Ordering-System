{% extends "base.html" %}

{% block content %}
<div class="auth-container" style="max-width: 500px; margin: 50px auto;">
    <div class="card">
        <h3 style="text-align: center; margin-bottom: 2rem;">Change Password</h3>

        {% if error %}
        <div style="background: #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/customer/change-password" method="post">
            <div style="margin-bottom: 1.5rem;">
                <label>Current Password</label>
                <input type="password" name="current_password" class="form-control" required>
                <small style="color: #666;">We need to verify it's you.</small>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Verify & Continue</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            <a href="/customer/dashboard">Back to Dashboard</a>
        </p>
    </div>
</div>
{% endblock %}
