{% extends "base.html" %}

{% block extra_head %}
<style>
    body {
        background-color: #F0F4F8;
    }

    .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
    }

    .auth-card {
        background: #FFFFFF;
        border-radius: 20px;
        padding: 3rem 2.5rem;
        max-width: 480px;
        /* Slightly wider for registration forms */
        width: 100%;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-title {
        font-size: 28px;
        font-weight: 800;
        color: #1E293B;
        margin: 0 0 0.5rem 0;
    }

    .auth-subtitle {
        font-size: 16px;
        color: #64748B;
        margin: 0;
    }

    .form-group {
        margin-bottom: 1.25rem;
    }

    .form-label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #475569;
        margin-bottom: 0.5rem;
    }

    .input-wrapper {
        position: relative;
    }

    .auth-input {
        width: 100%;
        height: 52px;
        padding: 0 16px;
        border: 1px solid #E2E8F0;
        border-radius: 12px;
        font-size: 15px;
        color: #1E293B;
        transition: all 0.2s;
        box-sizing: border-box;
        background: #F8FAFC;
    }

    .auth-input:focus {
        outline: none;
        border-color: #007AFF;
        background: #FFFFFF;
        box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
    }

    .auth-btn {
        width: 100%;
        height: 52px;
        background: #007AFF;
        color: #FFFFFF;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-btn:hover {
        background: #0051D5;
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(0, 122, 255, 0.4);
    }

    .auth-btn:active {
        transform: translateY(0);
    }

    .auth-btn:disabled {
        background: #94A3B8;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    .otp-input {
        text-align: center;
        letter-spacing: 0.5em;
        font-size: 20px;
        font-weight: 700;
    }

    .alert-box {
        padding: 1rem;
        border-radius: 12px;
        margin-bottom: 1.5rem;
        font-size: 14px;
        display: none;
        text-align: center;
    }

    .alert-error {
        background: #FEE2E2;
        color: #DC2626;
        border: 1px solid #FCA5A5;
    }

    .alert-success {
        background: #DCFCE7;
        color: #166534;
        border: 1px solid #86EFAC;
    }

    .alert-info {
        background: #E0F2FE;
        color: #0369A1;
        border: 1px solid #7DD3FC;
    }

    .bottom-link {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 15px;
        color: #64748B;
    }

    .bottom-link a {
        color: #007AFF;
        font-weight: 600;
        text-decoration: none;
    }

    .bottom-link a:hover {
        text-decoration: underline;
    }

    /* Animation for smoother step transitions */
    .step-container {
        animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media (max-width: 480px) {
        .auth-card {
            padding: 2rem 1.5rem;
        }

        .auth-title {
            font-size: 24px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join us to manage your orders efficiently</p>
        </div>

        <!-- Global Message Area -->
        <div id="messageBox" class="alert-box"></div>

        <!-- Step 1: Request OTP -->
        <div id="step1" class="step-container">
            <form id="requestOtpForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input class="auth-input" id="regName" type="text" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input class="auth-input" id="regEmail" type="email" placeholder="name@company.com" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Mobile Number</label>
                    <input class="auth-input" id="regMobile" type="tel" placeholder="9876543210" required />
                </div>
                <button class="auth-btn" type="submit" id="btnSendOtp">
                    Send OTP
                </button>
            </form>
            <div class="bottom-link">
                Already have an account? <a href="/login">Log In</a>
            </div>
        </div>

        <!-- Step 2: Verify OTP -->
        <div id="step2" class="step-container" style="display: none;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <p style="color: #64748B; font-size: 14px;">
                    We sent a 6-digit code to <br>
                    <strong id="displayEmail" style="color: #1E293B;"></strong>
                </p>
            </div>
            <form id="verifyOtpForm">
                <div class="form-group">
                    <label class="form-label" style="text-align: center;">Verification Code</label>
                    <input class="auth-input otp-input" id="regOtp" type="text" placeholder="000000" maxlength="6"
                        inputmode="numeric" required />
                </div>
                <button class="auth-btn" type="submit" id="btnVerifyOtp">
                    Verify & Continue
                </button>
                <button type="button" class="auth-btn" onclick="location.reload()"
                    style="background: transparent; color: #64748B; font-weight: 500; font-size: 14px; margin-top: 10px; height: auto; box-shadow: none;">
                    Use a different email
                </button>
            </form>
        </div>

        <!-- Step 3: Complete Registration -->
        <div id="step3" class="step-container" style="display: none;">
            <h3 style="text-align: center; font-size: 18px; color: #1E293B; margin-bottom: 1.5rem; font-weight: 700;">
                Final Details
            </h3>
            <form id="completeRegForm">
                <div class="form-group">
                    <label class="form-label">Business Name</label>
                    <input class="auth-input" id="regBusiness" type="text" placeholder="e.g. Grand Hotel" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Billing Address</label>
                    <textarea class="auth-input" id="regAddress" placeholder="Full street address"
                        style="height: 100px; padding-top: 12px; resize: none;" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Create Password</label>
                    <input class="auth-input" id="finalPass" type="password"
                        placeholder="Min 8 chars, 1 number, 1 symbol" required />
                </div>
                <button class="auth-btn" type="submit" id="btnComplete">
                    Complete Registration
                </button>
            </form>
        </div>

    </div>
</div>

<script>
    let email = "";
    let name = "";
    let mobile = "";

    // Helper: Button Loading State
    function setBtnLoading(btnId, isLoading, loadingText = "Processing...") {
        const btn = document.getElementById(btnId);
        if (!btn) return;

        if (isLoading) {
            btn.dataset.originalText = btn.innerHTML;
            btn.innerHTML = `
                <svg style="animation: spin 1s linear infinite; margin-right: 8px;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>
                </svg>
                ${loadingText}
            `;
            btn.disabled = true;
        } else {
            btn.innerHTML = btn.dataset.originalText || "Submit";
            btn.disabled = false;
        }
    }

    // Helper: Show Messages
    function showMessage(msg, type = "error") {
        const box = document.getElementById('messageBox');
        box.style.display = 'block';
        box.className = 'alert-box'; // reset

        if (type === 'error') box.classList.add('alert-error');
        else if (type === 'success') box.classList.add('alert-success');
        else box.classList.add('alert-info');

        box.textContent = msg;
    }

    function clearMessage() {
        document.getElementById('messageBox').style.display = 'none';
    }

    // Add spin keyframes
    const styleSheet = document.createElement("style");
    styleSheet.innerText = `
        @keyframes spin { 100% { transform: rotate(360deg); } }
    `;
    document.head.appendChild(styleSheet);


    // --- LOGIC HANDLERS ---

    // Step 1: Send OTP
    document.getElementById('requestOtpForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearMessage();
        setBtnLoading('btnSendOtp', true);

        email = document.getElementById('regEmail').value.trim();
        name = document.getElementById('regName').value.trim();
        mobile = document.getElementById('regMobile').value.trim();

        try {
            const res = await fetch('/auth/request-register-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, name, mobile })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                document.getElementById('displayEmail').textContent = email;
            } else {
                showMessage(data.error || 'Failed to send OTP', 'error');
            }
        } catch (err) {
            showMessage('Network error. Please try again.', 'error');
        } finally {
            setBtnLoading('btnSendOtp', false);
        }
    });

    // Step 2: Verify OTP
    document.getElementById('verifyOtpForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearMessage();
        setBtnLoading('btnVerifyOtp', true);

        const otp = document.getElementById('regOtp').value.trim();

        try {
            const res = await fetch('/auth/verify-register-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('step2').style.display = 'none';
                document.getElementById('step3').style.display = 'block';
                showMessage("OTP Verified! Please complete your details.", "success");
            } else {
                showMessage(data.error || 'Invalid OTP', 'error');
            }
        } catch (err) {
            showMessage('Network error. Please try again.', 'error');
        } finally {
            setBtnLoading('btnVerifyOtp', false);
        }
    });

    // Step 3: Complete
    document.getElementById('completeRegForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearMessage();

        const password = document.getElementById('finalPass').value;
        const business = document.getElementById('regBusiness').value.trim();
        const address = document.getElementById('regAddress').value.trim();

        // Frontend Validation
        if (password.length < 8) {
            showMessage("Password must be at least 8 characters.", "error");
            return;
        }
        if (!/\d/.test(password)) {
            showMessage("Password must contain at least one number.", "error");
            return;
        }
        if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
            showMessage("Password must contain at least one symbol.", "error");
            return;
        }
        if (!business || !address) {
            showMessage("Business Name and Address are required.", "error");
            return;
        }

        setBtnLoading('btnComplete', true, "Registering...");

        try {
            const res = await fetch('/auth/complete-registration', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    name: name,
                    mobile: mobile,
                    password: password,
                    business_name: business,
                    address: address,
                    category: 'General'
                })
            });
            const data = await res.json();

            if (data.success) {
                // Success! Redirect to login
                window.location.href = '/login?registered=true';
            } else {
                showMessage(data.error || 'Registration failed', 'error');
                setBtnLoading('btnComplete', false); // Only re-enable on failure
            }
        } catch (err) {
            showMessage('Network error. Please try again.', 'error');
            setBtnLoading('btnComplete', false);
        }
    });
</script>
{% endblock %}
