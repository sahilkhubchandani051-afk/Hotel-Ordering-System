{% extends "base.html" %}

{% block content %}
<div class="auth-container" style="max-width: 500px; margin: 50px auto;">
    <div class="card">
        <h3 style="text-align: center; margin-bottom: 2rem;">Set New Password</h3>

        {% if error %}
        <div style="background: #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/customer/set-new-password" method="post">
            <div style="margin-bottom: 1.5rem;">
                <label>New Password</label>
                <input type="password" name="new_password" class="form-control" required
                    placeholder="Min 8 chars, 1 number, 1 special">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success" style="width: 100%;">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
