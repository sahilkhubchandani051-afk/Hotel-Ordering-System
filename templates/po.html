{% extends "base.html" %}

{% block extra_head %}
<style>
    body {
        background-color: #F8FAFC;
    }

    .success-container {
        max-width: 500px;
        margin: 0 auto;
        padding: 2rem 1rem;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .success-card {
        background: #FFFFFF;
        border-radius: 24px;
        padding: 3rem 2rem 2rem 2rem;
        text-align: center;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .success-icon-wrapper {
        margin-bottom: 2rem;
        position: relative;
        display: inline-block;
    }

    .success-icon {
        width: 120px;
        height: 120px;
        background: linear-gradient(135deg, #10B981 0%, #059669 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        box-shadow: 0 0 0 12px rgba(16, 185, 129, 0.1),
            0 0 0 24px rgba(16, 185, 129, 0.05),
            0 8px 16px rgba(16, 185, 129, 0.3);
    }

    .success-icon::before {
        content: '';
        position: absolute;
        inset: -20px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(16, 185, 129, 0.2) 0%, transparent 70%);
        animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

        0%,
        100% {
            opacity: 1;
            transform: scale(1);
        }

        50% {
            opacity: 0.8;
            transform: scale(1.05);
        }
    }

    .checkmark {
        width: 60px;
        height: 60px;
        stroke: #FFFFFF;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        position: relative;
        z-index: 1;
    }

    .checkmark-path {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: draw 0.6s ease-out 0.2s forwards;
    }

    @keyframes draw {
        to {
            stroke-dashoffset: 0;
        }
    }

    .success-title {
        font-size: 24px;
        font-weight: 800;
        color: #1E293B;
        margin: 0 0 0.75rem 0;
        letter-spacing: -0.5px;
    }

    .success-subtitle {
        font-size: 16px;
        font-weight: 500;
        color: #64748B;
        margin: 0 0 2.5rem 0;
        line-height: 1.5;
    }

    .button-container {
        display: flex;
        justify-content: center;
        width: 100%;
    }

    .done-button {
        width: 100%;
        max-width: 400px;
        padding: 16px 24px;
        background: #007AFF;
        color: #FFFFFF;
        border: none;
        border-radius: 14px;
        font-size: 17px;
        font-weight: 700;
        text-decoration: none;
        display: block;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        text-align: center;
    }

    .done-button:hover:not(:disabled) {
        background: #0051D5;
        box-shadow: 0 6px 16px rgba(0, 122, 255, 0.4);
        transform: translateY(-1px);
    }

    .done-button:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
    }

    .done-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    /* Hide bottom navigation on success page */
    .bottom-nav {
        display: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="success-container">
    <div class="success-card">
        <div class="success-icon-wrapper">
            <div class="success-icon">
                <svg class="checkmark" viewBox="0 0 52 52">
                    <path class="checkmark-path" d="M14 27l10 10 20-20" />
                </svg>
            </div>
        </div>

        <h1 class="success-title">Submission Successful!</h1>
        <p class="success-subtitle">Your quotation decisions have been processed.</p>

        <div class="button-container">
            <button class="done-button" id="doneButton" onclick="handleDone()">DONE</button>
        </div>
    </div>
</div>

<script>
    // Prevent double-clicks and handle redirect
    let isRedirecting = false;

    function handleDone() {
        if (isRedirecting) return;

        isRedirecting = true;
        const btn = document.getElementById('doneButton');
        btn.disabled = true;
        btn.textContent = 'Redirecting...';

        // Immediate redirect to Quotation Inbox
        window.location.href = '/customer/quotations';
    }

    // Auto-redirect after 5 seconds as safety net
    setTimeout(function () {
        if (!isRedirecting) {
            window.location.href = '/customer/quotations';
        }
    }, 5000);

    // Prevent back button from resubmitting
    if (window.history && window.history.pushState) {
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.pushState(null, null, window.location.href);
        };
    }
</script>
{% endblock %}
