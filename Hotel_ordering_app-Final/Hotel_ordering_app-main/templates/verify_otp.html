<!DOCTYPE html>
<html>

<head>
    <title>Verify OTP - Hotel System</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            text-align: center;
        }

        input {
            display: block;
            width: 100%;
            margin: 20px 0;
            padding: 10px;
            box-sizing: border-box;
            font-size: 1.2em;
            text-align: center;
            letter-spacing: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
        }

        .info {
            color: #555;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <h2>Verification Required</h2>
    <p class="info">We have sent a 6-digit verification code to <strong>{{ email }}</strong>.</p>
    <p class="info" style="font-size: 0.9em; background: #f8f9fa; padding: 10px;">(Check the server console for the
        simulated OTP)</p>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form action="/verify" method="post">
        <label>Enter OTP Code:</label>
        <input type="text" name="otp" maxlength="6" required placeholder="000000">
        <button type="submit">Verify Account</button>
    </form>
</body>

</html>
