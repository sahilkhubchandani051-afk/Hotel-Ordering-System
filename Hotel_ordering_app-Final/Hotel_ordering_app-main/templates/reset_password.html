{% extends "base.html" %}

{% block content %}
<div class="auth-container" style="max-width: 450px; margin: 50px auto;">
    <div class="card">
        <h3 style="text-align: center; margin-bottom: 1.5rem;">Set New Password</h3>

        {% if error %}
        <div style="background: #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
            {{ error }}
        </div>
        {% endif %}

        <p style="text-align: center; color: #555; margin-bottom: 2rem;">
            Enter the 6-digit code sent to<br>
            <strong>{{ email }}</strong>
        </p>

        <form action="/reset-password" method="post">
            <div style="margin-bottom: 1.5rem;">
                <label>Verification Code (OTP)</label>
                <input type="text" name="otp" class="form-control" required maxlength="6" placeholder="000000"
                    style="font-size: 1.5rem; letter-spacing: 0.3rem; text-align: center;" pattern="[0-9]{6}">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label>New Password</label>
                <input type="password" name="new_password" class="form-control" required
                    placeholder="Min 8 chars, 1 number, 1 special">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password</button>
        </form>
    </div>
</div>
{% endblock %}
