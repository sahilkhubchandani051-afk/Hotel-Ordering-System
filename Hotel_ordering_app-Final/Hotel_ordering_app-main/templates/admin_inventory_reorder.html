{% extends "base.html" %}

{% block content %}
<div class="header-section" style="margin-bottom: 1rem;">
    <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom: 0.5rem;">
        <a href="/admin/inventory" style="text-decoration:none; color:var(--text-muted);">← Back</a>
    </div>
    <h1>Bulk Reorder Levels</h1>
</div>

<!-- Controls -->
<div class="card"
    style="padding: 1rem; margin-bottom: 1rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
    <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: space-between; align-items: center;">
        <div style="flex: 1; min-width: 200px;">
            <input type="text" id="searchInput" class="form-control" placeholder="Search products..."
                onkeyup="filterTable()">
        </div>
        <div>
            <button onclick="saveAll()" class="btn btn-primary" id="saveBtn">Save Changes</button>
        </div>
    </div>
</div>

<!-- Grid -->
<div class="card" style="padding: 0; overflow: hidden;">
    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead style="background: #f8f9fa; border-bottom: 1px solid #eee;">
                <tr>
                    <th style="padding: 1rem; text-align: left; width: 40%;">Product</th>
                    <th style="padding: 1rem; text-align: left; width: 30%;">Shop Reorder</th>
                    <th style="padding: 1rem; text-align: left; width: 30%;">Godown Reorder</th>
                </tr>
            </thead>
            <tbody id="productTableBody">
                {% for p in products %}
                <tr class="product-row" data-name="{{ p.name.lower() }}" data-id="{{ p.id }}">
                    <td style="padding: 0.75rem 1rem; border-bottom: 1px solid #eee;">
                        <div style="font-weight: 500;">{{ p.name }}</div>
                        <div style="font-size: 0.8rem; color: #666;">{{ p.unit }}</div>
                    </td>
                    <td style="padding: 0.75rem 1rem; border-bottom: 1px solid #eee;">
                        <input type="number" class="form-control shop-input"
                            value="{{ p.reorder_level_shop if p.reorder_level_shop is not none else 5 }}" min="0"
                            style="width: 100px;">
                    </td>
                    <td style="padding: 0.75rem 1rem; border-bottom: 1px solid #eee;">
                        <input type="number" class="form-control godown-input"
                            value="{{ p.reorder_level_godown if p.reorder_level_godown is not none else 10 }}" min="0"
                            style="width: 100px;">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    function filterTable() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const rows = document.querySelectorAll('.product-row');
        rows.forEach(row => {
            const name = row.getAttribute('data-name');
            if (name.includes(query)) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    }

    async function saveAll() {
        if (!confirm("Update reorder levels for all visible products?")) return;

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = "Saving...";

        const items = [];
        document.querySelectorAll('.product-row').forEach(row => {
            // Include all or just visible? Usually all is safer for "Bulk Update", but if filtering...
            // Requirement says "Table with all products". 
            // I'll grab all, even if filtered out, unless requirement implies otherwise. 
            // "Bulk setup" usually means all.
            const pid = row.getAttribute('data-id');
            const shop = parseInt(row.querySelector('.shop-input').value) || 0;
            const godown = parseInt(row.querySelector('.godown-input').value) || 0;

            items.push({
                product_id: parseInt(pid),
                reorder_shop: shop,
                reorder_godown: godown
            });
        });

        try {
            const response = await fetch('/admin/inventory/bulk-reorder-update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: items })
            });

            const res = await response.json();
            if (res.success) {
                alert("Updated successfully!");
                window.location.href = "/admin/inventory";
            } else {
                alert("Error: " + (res.error || "Unknown"));
                btn.disabled = false;
                btn.innerText = "Save Changes";
            }
        } catch (e) {
            console.error(e);
            alert("Failed to connect");
            btn.disabled = false;
            btn.innerText = "Save Changes";
        }
    }
</script>
{% endblock %}
